services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: viet_acosla
      TZ: Asia/Ho_Chi_Minh
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
    command: npm run start --workspace services/user-service
    depends_on:
      - mysql

  quiz-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
    command: npm run start --workspace services/quiz-service
    depends_on:
      - mysql

  media-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MEDIA_STORAGE_DIR: /app/services/media-service/storage
    command: npm run start --workspace services/media-service
    volumes:
      - media_storage:/app/services/media-service/storage
    depends_on:
      - mysql

  stats-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
    command: npm run start --workspace services/stats-service
    depends_on:
      - mysql

  materials-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
    command: npm run start --workspace services/materials-service
    depends_on:
      - mysql

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      USER_SERVICE_URL: http://user-service:4003
      QUIZ_SERVICE_URL: http://quiz-service:4001
      MEDIA_SERVICE_URL: http://media-service:4002
      STATS_SERVICE_URL: http://stats-service:4004
      MATERIALS_SERVICE_URL: http://materials-service:4005
    command: npm run start --workspace apps/api-gateway
    depends_on:
      - user-service
      - quiz-service
      - media-service
      - stats-service
      - materials-service
    ports:
      - '8080:8080'

volumes:
  mysql_data:
  media_storage:
